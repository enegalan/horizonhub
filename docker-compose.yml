services:
  hub:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: horizonhub
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_URL=http://localhost
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=horizonhub
      - DB_USERNAME=horizonhub
      - DB_PASSWORD=secret
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CACHE_STORE=redis
      - SESSION_DRIVER=redis
      - BROADCAST_CONNECTION=null
    volumes:
      - .:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - horizonhub

  mysql:
    image: mysql:8.0
    container_name: horizonhub-mysql
    restart: unless-stopped
    command:
      - mysqld
      - --innodb-redo-log-capacity=134217728
      - --innodb-flush-method=fsync
    environment:
      MYSQL_DATABASE: horizonhub
      MYSQL_USER: horizonhub
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: rootsecret
    volumes:
      - horizonhub_mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootsecret"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - horizonhub

  redis:
    image: redis:7-alpine
    container_name: horizonhub-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - horizonhub_redis_data:/data
    networks:
      - horizonhub

volumes:
  horizonhub_mysql_data:
  horizonhub_redis_data:

networks:
  horizonhub:
    driver: bridge
