services:
  hub:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: horizonhub
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_URL=http://localhost
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=horizonhub
      - DB_USERNAME=horizonhub
      - DB_PASSWORD=secret
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CACHE_STORE=redis
      - SESSION_DRIVER=redis
      - BROADCAST_CONNECTION=null
    volumes:
      - .:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - horizonhub

  mysql:
    image: mysql:8.0
    container_name: horizonhub-mysql
    restart: unless-stopped
    command:
      - mysqld
      - --innodb-redo-log-capacity=134217728
      - --innodb-flush-method=fsync
    environment:
      MYSQL_DATABASE: horizonhub
      MYSQL_USER: horizonhub
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: rootsecret
    volumes:
      - horizonhub_mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootsecret"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - horizonhub

  redis:
    image: redis:7-alpine
    container_name: horizonhub-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - horizonhub_redis_data:/data
    networks:
      - horizonhub

  redis-demo-1:
    image: redis:7-alpine
    container_name: horizon-demo-redis-1
    restart: unless-stopped
    networks:
      - horizonhub
    profiles:
      - demo

  redis-demo-2:
    image: redis:7-alpine
    container_name: horizon-demo-redis-2
    restart: unless-stopped
    networks:
      - horizonhub
    profiles:
      - demo

  redis-demo-3:
    image: redis:7-alpine
    container_name: horizon-demo-redis-3
    restart: unless-stopped
    networks:
      - horizonhub
    profiles:
      - demo

  demo-app-1:
    build:
      context: .
      dockerfile: examples/demo-app/Dockerfile
    container_name: horizon-demo-app-1
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      APP_NAME: "Demo Orders"
      APP_ENV: local
      APP_DEBUG: "true"
      REDIS_HOST: redis-demo-1
      REDIS_PORT: "6379"
      QUEUE_CONNECTION: redis
      HORIZON_HUB_URL: http://hub
      HORIZON_HUB_API_KEY: demo-service-1-api-key-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
      HORIZON_HUB_SERVICE_NAME: "Demo Orders"
    depends_on:
      - redis-demo-1
    networks:
      - horizonhub
    profiles:
      - demo

  demo-app-2:
    build:
      context: .
      dockerfile: examples/demo-app/Dockerfile
    container_name: horizon-demo-app-2
    restart: unless-stopped
    ports:
      - "8082:80"
    environment:
      APP_NAME: "Demo Notifications"
      APP_ENV: local
      APP_DEBUG: "true"
      REDIS_HOST: redis-demo-2
      REDIS_PORT: "6379"
      QUEUE_CONNECTION: redis
      HORIZON_HUB_URL: http://hub
      HORIZON_HUB_API_KEY: demo-service-2-api-key-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
      HORIZON_HUB_SERVICE_NAME: "Demo Notifications"
    depends_on:
      - redis-demo-2
    networks:
      - horizonhub
    profiles:
      - demo

  demo-app-3:
    build:
      context: .
      dockerfile: examples/demo-app/Dockerfile
    container_name: horizon-demo-app-3
    restart: unless-stopped
    ports:
      - "8083:80"
    environment:
      APP_NAME: "Demo Reports"
      APP_ENV: local
      APP_DEBUG: "true"
      REDIS_HOST: redis-demo-3
      REDIS_PORT: "6379"
      QUEUE_CONNECTION: redis
      HORIZON_HUB_URL: http://hub
      HORIZON_HUB_API_KEY: demo-service-3-api-key-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
      HORIZON_HUB_SERVICE_NAME: "Demo Reports"
    depends_on:
      - redis-demo-3
    networks:
      - horizonhub
    profiles:
      - demo

volumes:
  horizonhub_mysql_data:
  horizonhub_redis_data:

networks:
  horizonhub:
    driver: bridge
