services:
  hub:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: horizon-hub
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_URL=http://localhost
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=horizonhub
      - DB_USERNAME=horizonhub
      - DB_PASSWORD=secret
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - BROADCAST_CONNECTION=reverb
      - REVERB_APP_ID=horizonhub
      - REVERB_APP_KEY=key
      - REVERB_APP_SECRET=secret
      - REVERB_HOST=0.0.0.0
      - REVERB_PORT=6001
      - REVERB_SCHEME=http
    volumes:
      - .:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - horizonhub

  reverb:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: horizon-hub-reverb
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan reverb:start --host=0.0.0.0 --port=6001
    environment:
      - APP_ENV=production
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_DATABASE=horizonhub
      - DB_USERNAME=horizonhub
      - DB_PASSWORD=secret
      - REDIS_HOST=redis
      - BROADCAST_CONNECTION=reverb
      - REVERB_APP_ID=horizonhub
      - REVERB_APP_KEY=key
      - REVERB_APP_SECRET=secret
      - REVERB_SERVER_PORT=6001
    volumes:
      - .:/var/www/html
    depends_on:
      - hub
      - redis
    networks:
      - horizonhub
    ports:
      - "6001:6001"

  mysql:
    image: mysql:8.0
    container_name: horizon-hub-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: horizonhub
      MYSQL_USER: horizonhub
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: rootsecret
    volumes:
      - horizonhub_mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootsecret"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - horizonhub

  redis:
    image: redis:7-alpine
    container_name: horizon-hub-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - horizonhub_redis_data:/data
    networks:
      - horizonhub

  redis-demo-1:
    image: redis:7-alpine
    container_name: horizon-demo-redis-1
    restart: unless-stopped
    networks:
      - horizonhub
    profiles:
      - demo

  redis-demo-2:
    image: redis:7-alpine
    container_name: horizon-demo-redis-2
    restart: unless-stopped
    networks:
      - horizonhub
    profiles:
      - demo

  redis-demo-3:
    image: redis:7-alpine
    container_name: horizon-demo-redis-3
    restart: unless-stopped
    networks:
      - horizonhub
    profiles:
      - demo

  demo-app-1:
    build:
      context: .
      dockerfile: examples/demo-app/Dockerfile
    container_name: horizon-demo-app-1
    restart: unless-stopped
    environment:
      APP_NAME: "Demo Orders"
      APP_ENV: local
      APP_DEBUG: "true"
      REDIS_HOST: redis-demo-1
      REDIS_PORT: "6379"
      QUEUE_CONNECTION: redis
      HORIZON_HUB_URL: http://hub
      HORIZON_HUB_API_KEY: demo-service-1-api-key-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
      HORIZON_HUB_SERVICE_NAME: "Demo Orders"
    depends_on:
      - redis-demo-1
    networks:
      - horizonhub
    profiles:
      - demo

  demo-app-2:
    build:
      context: .
      dockerfile: examples/demo-app/Dockerfile
    container_name: horizon-demo-app-2
    restart: unless-stopped
    environment:
      APP_NAME: "Demo Notifications"
      APP_ENV: local
      APP_DEBUG: "true"
      REDIS_HOST: redis-demo-2
      REDIS_PORT: "6379"
      QUEUE_CONNECTION: redis
      HORIZON_HUB_URL: http://hub
      HORIZON_HUB_API_KEY: demo-service-2-api-key-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
      HORIZON_HUB_SERVICE_NAME: "Demo Notifications"
    depends_on:
      - redis-demo-2
    networks:
      - horizonhub
    profiles:
      - demo

  demo-app-3:
    build:
      context: .
      dockerfile: examples/demo-app/Dockerfile
    container_name: horizon-demo-app-3
    restart: unless-stopped
    environment:
      APP_NAME: "Demo Reports"
      APP_ENV: local
      APP_DEBUG: "true"
      REDIS_HOST: redis-demo-3
      REDIS_PORT: "6379"
      QUEUE_CONNECTION: redis
      HORIZON_HUB_URL: http://hub
      HORIZON_HUB_API_KEY: demo-service-3-api-key-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
      HORIZON_HUB_SERVICE_NAME: "Demo Reports"
    depends_on:
      - redis-demo-3
    networks:
      - horizonhub
    profiles:
      - demo

volumes:
  horizonhub_mysql_data:
  horizonhub_redis_data:

networks:
  horizonhub:
    driver: bridge
